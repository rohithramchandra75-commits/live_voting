<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Live Voting Poll</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>🗳 Live Voting Poll</h1>

    <!-- AUTH SECTION -->
    <div class="auth">
      <button id="loginBtn">Login with Google</button>
      <button id="logoutBtn" style="display:none;">Logout</button>
      <p id="userInfo"></p>
    </div>

    <!-- POLL -->
    <div class="poll">
      <button onclick="vote('A')">Option A</button>
      <button onclick="vote('B')">Option B</button>
      <button onclick="vote('C')">Option C</button>
    </div>

    <!-- RESULTS -->
    <div class="results">
      <h2>Results</h2>

      <div class="item">
        <span id="countA">A: 0</span>
        <div class="bar"><div id="barA"></div></div>
      </div>

      <div class="item">
        <span id="countB">B: 0</span>
        <div class="bar"><div id="barB"></div></div>
      </div>

      <div class="item">
        <span id="countC">C: 0</span>
        <div class="bar"><div id="barC"></div></div>
      </div>

    </div>
  </div>

  <script type="module" src="app.js"></script>

</body>
</html>
